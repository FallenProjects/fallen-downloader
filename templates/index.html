<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fallen Downloader</title>

    <link rel="stylesheet" href="style.css?v=1.0.1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
<div class="container">
    <header>
        <h1><i class="fas fa-cloud-download-alt"></i> Fallen Downloader</h1>
        <p>Fast, Secure, and Modern</p>
    </header>

    <main>
        <div class="card glass">
            <div class="input-group">
                <input type="text" id="url-input"
                       placeholder="Paste link here (Instagram, TikTok, Spotify...)"
                       autocomplete="off">

                <button id="download-btn" disabled>
                    <i class="fas fa-download"></i> Download
                </button>
            </div>

            <div id="platform-badge" class="badge hidden"></div>
        </div>

        <div id="status-message" class="status-message hidden"></div>

        <div id="loader" class="loader hidden">
            <div class="spinner"></div>
            <p>Processing...</p>
        </div>

        <div id="result-container" class="result-container hidden"></div>

        <!-- invisible turnstile -->
        <div id="turnstile-container"></div>
    </main>

    <footer>
        <p>&copy; 2026 Fallen Downloader. Powered by api.fallenapi.fun</p>
    </footer>
</div>

<script>
    window.turnstileSiteKey = "{{.TurnstileSiteKey}}";
    window.onloadTurnstileCallback = function() {
        window.turnstileReady = true;
        if (typeof window.initTurnstile === 'function') {
            window.initTurnstile();
        }
    };
</script>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit&onload=onloadTurnstileCallback" defer></script>
<script src="app.js?v=1.0.1" defer></script>
</body>
</html>
